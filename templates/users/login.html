{% extends "base.html" %}
{%load static %}

{% block title %}Login{% endblock %}

{% block content %}
    <h2 class="text-xl font-bold mb-4">Login</h2>
    <form class="bg-white p-6 shadow rounded" id="loginForm">
        {% csrf_token %}
        <input type="text" id="username" placeholder="Username" class="input"><br><br>
        <input type="password" id="password" placeholder="Password" class="input"><br><br>

        <button class="bg-blue-500 text-white px-4 py-2 rounded" type="submit">Login</button>
    </form>
{% endblock %}
