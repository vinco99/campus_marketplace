{% extends "base.html" %}

{% block content %}
<h2 class="text-xl font-bold mb-4">Login</h2>

<form method="POST" class="bg-white p-6 shadow rounded">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" class="input"><br><br>
    <input type="password" name="password" placeholder="Password" class="input"><br><br>

    <button class="bg-blue-500 text-white px-4 py-2 rounded">Login</button>
</form>
{% endblock %}
