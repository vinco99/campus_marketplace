{% extends "base.html" %}

{% block content %}
<h2 class="text-xl font-bold mb-4">Create Product</h2>

<form method="POST" enctype="multipart/form-data" class="bg-white p-6 shadow rounded">
    {% csrf_token %}

    <input type="text" name="name" placeholder="Product Name" class="input"><br><br>

    <textarea name="description" placeholder="Description" class="input"></textarea><br><br>

    <input type="number" name="price" placeholder="Price" class="input"><br><br>

    <input type="file" name="images" multiple><br><br>

    <button class="bg-green-500 text-white px-4 py-2 rounded">
        Create Product
    </button>
</form>
{% endblock %}
